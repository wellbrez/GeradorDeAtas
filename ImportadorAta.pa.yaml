                                            Concat(
                                              Filter(col_ItensPaginados, Pagina = Value) As pgItem,
                                              With({itm: pgItem.ItemData},
                                                With(
                                                  {
                                                    itemCodigo: Coalesce(Text(itm.Value.item), ""),
