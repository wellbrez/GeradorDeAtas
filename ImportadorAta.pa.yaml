                                                      If(Value = CountRows(Table(itm.Value.historico)),Text(DateValue(Index(Table(itm.Value.historico),Value).Value.criadoEm),"yyyy-mm-dd")&": "&Text(Index(Table(itm.Value.historico),Value).Value.descricao),"<i style='color:lightgray'>"&Text(DateValue(Index(Table(itm.Value.historico),Value).Value.criadoEm),"yyyy-mm-dd")&": "&Text(Index(Table(itm.Value.historico),Value).Value.descricao)&"</i>")
                                                    ),Value,"<br>"),
                                                    responsavelNome: If(IsBlank(itm.Value.UltimoHistorico), "", Coalesce(Text(itm.Value.UltimoHistorico.responsavel.nome), "")),
                                                    responsavelEmail: If(IsBlank(itm.Value.UltimoHistorico), "", Coalesce(Text(itm.Value.UltimoHistorico.responsavel.email), "")),
                                                    dataTexto: If(IsBlank(itm.Value.UltimoHistorico), "", Coalesce(Text(itm.Value.UltimoHistorico.data), "")),
                                                    statusTexto: If(IsBlank(itm.Value.UltimoHistorico), "", Coalesce(Text(itm.Value.UltimoHistorico.status), "")),
                                                    temFilhos: If(IsBlank(itm.Value.filhos), false, CountRows(Table(itm.Value.filhos)) > 0)
                                                  },
                                                  With(
                                                    {
                                                      descricaoHtml: Substitute(Substitute(TrimEnds(descricaoBruta), Char(13), ""), Char(10), "<br>"),
                                                      responsavelHtml: If(!IsBlank(responsavelNome) && !IsBlank(responsavelEmail), responsavelNome & " / " & responsavelEmail, Coalesce(responsavelNome, responsavelEmail)),
                                                      dataFormatada: If(IsBlank(dataTexto), "", With({dataConvertida: IfError(DateValue(dataTexto), Blank())}, If(IsBlank(dataConvertida), "", Text(dataConvertida, "dd/mm/yyyy")))),
                                                      statusRepresentacao: Switch(statusTexto, "Concluído", "🟢 Concluído", "Pendente", "🟡 Pendente", "Em Andamento", "🔵 Em andamento", "Cancelado", "⚫ Cancelado","Info","⚪ Info", Coalesce(statusTexto, "")),
                                                      statusEstilo: "border:1px solid #d8d8d8;color:#000000;background-color:transparent;padding:3px;word-break:break-word;vertical-align:top;text-align:center;font-weight:bold;white-space:nowrap;font-family:'Vale Sans','Segoe UI',Arial,sans-serif;font-size:10pt;" & If(statusTexto = "Concluído", "color:#0d875c;", "")
                                                    },
                                                    If(
                                                      temFilhos,
                                                      "<tr style=''" & "page-break-inside:avoid;break-inside:avoid;" & "''><td style=''" & "border:1px solid #d8d8d8;color:#000000;background-color:#e0f2f1;padding:3px;word-break:break-word;vertical-align:top;text-align:left;font-weight:bold;font-family:'Vale Sans','Segoe UI',Arial,sans-serif;font-size:10pt;" & "''>" & itemCodigo & "</td><td style=''" & "border:1px solid #d8d8d8;color:#000000;background-color:#e0f2f1;padding:3px;word-break:break-word;vertical-align:top;text-align:left;font-weight:bold;font-family:'Vale Sans','Segoe UI',Arial,sans-serif;font-size:10pt;" & "'' colspan='4'>" &descricaoHtml & "</td></tr>",
                                                      "<tr style=''" & "page-break-inside:avoid;break-inside:avoid;" & "''><td style=''" & "border:1px solid #d8d8d8;color:#000000;background-color:transparent;padding:3px;word-break:break-word;vertical-align:top;text-align:left;font-family:'Vale Sans','Segoe UI',Arial,sans-serif;font-size:10pt;" & "''>" & itemCodigo & "</td><td style=''" & "border:1px solid #d8d8d8;color:#000000;background-color:transparent;padding:3px;word-break:break-word;vertical-align:top;text-align:left;font-family:'Vale Sans','Segoe UI',Arial,sans-serif;font-size:10pt;" & "''>" &descricaoHtml & "</td><td style=''" & "border:1px solid #d8d8d8;color:#000000;background-color:transparent;padding:3px;word-break:break-word;vertical-align:top;text-align:left;font-family:'Vale Sans','Segoe UI',Arial,sans-serif;font-size:10pt;" & "''>" & Coalesce(responsavelHtml, "") & "</td><td style=''" & "border:1px solid #d8d8d8;color:#000000;background-color:transparent;padding:3px;word-break:break-word;vertical-align:top;text-align:left;font-family:'Vale Sans','Segoe UI',Arial,sans-serif;font-size:10pt;" & "''>" & dataFormatada & "</td><td style=''" & statusEstilo & "''>" & statusRepresentacao & "</td></tr>"
                                                    )
                                                  )
                                                ))
                                            ) &
                                            "</table></div></td></tr></tbody></table></div>"
                                          )
                                        );
                                        Set(
                                          gbl_Email_Corpo,
                                          "<!DOCTYPE html><html lang='pt-BR'><head><meta charset='UTF-8'><title>" & varCabecalhoEmail.numero & "</title></head><body style=''" & estiloBody & "''>" &
                                          var_HTML_Pagina1 &
                                          var_HTML_Itens &
                                          "</body></html>"
                                        )
                                      );
                                      Set(showPreviewEmail, true);
                                      Notify("Prévia gerada com sucesso! Revise o conteúdo antes de enviar.", NotificationType.Information)
                                    Text: ="Gerar Prévia"
