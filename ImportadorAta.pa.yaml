                            Children:
                              - lblSelecionarResponsaveis:
                                  Control: Label@2.5.1
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Stretch
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    Size: =14
                                    Text: ="Selecione os responsáveis que receberão e-mail com ações pendentes:"
                              - galResponsaveisPendentes:
                                  Control: Gallery@2.15.0
                                  Variant: Vertical
                                  Properties:
                                    Height: =300
                                    Items: =colResponsaveisPendentes
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    LayoutMinHeight: =0
                                    TemplateSize: =50
                                  Children:
                                    - ContainerResponsavelItem:
                                        Control: GroupContainer@1.4.0
                                        Variant: AutoLayout
                                        Properties:
                                          BorderThickness: =1
                                          Fill: =RGBA(245, 245, 245, 1)
                                          Height: =Parent.TemplateHeight
                                          LayoutDirection: =LayoutDirection.Horizontal
                                          PaddingBottom: =10
                                          PaddingLeft: =10
                                          PaddingRight: =10
                                          PaddingTop: =10
                                          Width: =Parent.TemplateWidth
                                        Children:
                                          - chkSelecionarResponsavel:
                                              Control: CheckBox@0.0.30
                                              Properties:
                                                Checked: =ThisItem.Selecionado
                                                LayoutMaxHeight: =
                                                LayoutMaxWidth: =
                                                OnCheck: |-
                                                  =Patch(colResponsaveisPendentes, ThisItem, {Selecionado: true})
                                                OnUncheck: |-
                                                  =Patch(colResponsaveisPendentes, ThisItem, {Selecionado: false})
                                                Width: =30
                                          - lblResponsavelNome:
                                              Control: Label@2.5.1
                                              Properties:
                                                FillPortions: =1
                                                FontWeight: =FontWeight.Bold
                                                LayoutMaxHeight: =
                                                LayoutMaxWidth: =
                                                Text: =ThisItem.nome & " (" & ThisItem.email & ")"
                              - btnEnviarEmailsResponsaveis:
                                  Control: Button@0.0.45
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Center
                                    DisplayMode: =If(CountRows(Filter(colResponsaveisPendentes, Selecionado)) > 0, DisplayMode.Edit, DisplayMode.Disabled)
                                    Height: =50
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    OnSelect: "=ForAll(Filter(colResponsaveisPendentes, Selecionado) As CRP,\n    With(\n        {\n            MeusItensDiretos: Filter(\n                colItens,\n                !IsBlank(UltimoHistorico) &&\n                Lower(UltimoHistorico.responsavelEmail) = Lower(CRP.email) &&\n                With(\n                    {statusNormalizado: Lower(Substitute(UltimoHistorico.status, \"í\", \"i\"))},\n                    statusNormalizado <> \"cancelado\" && statusNormalizado <> \"concluido\" && statusNormalizado <> \"info\"\n                )\n            )\n        },\n        If(CountRows(MeusItensDiretos) > 0,\n            With(\n                {\n                    ItensHierarquicos: Filter(\n                        colItens,\n                        item in MeusItensDiretos.item ||\n                        CountRows(Filter(MeusItensDiretos, StartsWith(item, colItens[@item] & \".\"))) > 0\n                    )\n                },\n                With(\n                    {\n                        ItensPreparados: Sort(\n                            AddColumns(\n                                ItensHierarquicos,\n                                SortKey, Concat(Split(item, \".\"), Text(Value(Value), \"00000000\") & \".\"),\n                                NivelCalculado, CountRows(Split(item, \".\")),\n                                EhResponsavelDireto, item in MeusItensDiretos.item\n                            ),\n                            SortKey,\n                            SortOrder.Ascending\n                        )\n                    },\n                    With(\n                        {\n                            HTMLGerado: \"<html><body style='font-family: Segoe UI, Arial, sans-serif; padding: 20px; color: #333;'>\n                            \n                            <h2>Ata \" & IfError(Text(ParseJSON(varJSONImportado).cabecalho.numero), \"\") & \" - Ações Pendentes</h2>\n                            \n                            <p><strong>Data:</strong> \" & Text(IfError(DateValue(Text(ParseJSON(varJSONImportado).cabecalho.data)), Today()), \"dd/mm/yyyy\") & \"<br>\n                            <strong>Tipo:</strong> \" & IfError(Text(ParseJSON(varJSONImportado).cabecalho.tipo), \"\") & \"<br>\n                            <strong>Título:</strong> \" & IfError(Text(ParseJSON(varJSONImportado).cabecalho.titulo), \"\") & \"</p>\n                            \n                            <p>Prezado(a) <strong>\" & Proper(CRP.nome) & \"</strong>,</p>\n                            \n                            <p>Não é necessário responder este e-mail.</p>\n\n                            <p>Este é um e-mail gerado automaticamente na reunião do dia \" & Text(IfError(DateValue(Text(ParseJSON(varJSONImportado).cabecalho.data)), Today()), \"dd/mm/yyyy\") & \", referente ao Projeto \" & IfError(Text(ParseJSON(varJSONImportado).cabecalho.projeto), \"\") & \".</p>\n\n                            <p>Segue lista de ações conforme acordado nesta reunião.</p>\n\n                            <p>Este e-mail serve como um lembrete das ações que se encontram sob sua responsabilidade, para orientá-lo sobre as ações que serão solicitadas na próxima reunião.</p>\n                            \n                            <h3>Ações Pendentes:</h3>\n                            <table border='1' cellpadding='5' cellspacing='0' style='border-collapse: collapse; width: 100%; border: 1px solid #999; font-size: 10pt;'>\n                                <tr style='background-color: #007e7a; color: white;'>\n                                    <th style='width: 10%;'>Item</th>\n                                    <th style='width: 50%;'>Descrição</th>\n                                    <th style='width: 20%; text-align: center;'>Data</th>\n                                    <th style='width: 20%; text-align: center;'>Status</th>\n                                </tr>\" & \n                                Concat(ItensPreparados As ir, \n                                    With({\n                                        bgColor: If(ir.EhResponsavelDireto, \n                                            \"#ffffff\",\n                                            If(ir.NivelCalculado = 1, \"#cccccc\", \"#e6e6e6\")\n                                        ),\n                                        fontWeight: If(!ir.EhResponsavelDireto, \"bold\", \"normal\"),\n                                        paddingLeft: (ir.NivelCalculado - 1) * 15 & \"px\"\n                                    },\n                                    If(ir.EhResponsavelDireto,\n                                        \"<tr style='background-color: \" & bgColor & \";'>\n                                            <td style='vertical-align: top;'>\" & ir.item & \"</td>\n                                            <td style='vertical-align: top; padding-left: \" & paddingLeft & \";'>\" & \n                                                Concat(ForAll(Sequence(CountRows(Table(ir.historico)),1),\n                If(Value = CountRows(Table(ir.historico)),Text(DateValue(Index(Table(ir.historico),Value).criadoEm),\"yyyy-mm-dd\")&\": \"&Text(Index(Table(ir.historico),Value).descricao),\"<i style='color:lightgray'>\"&Text(DateValue(Index(Table(ir.historico),Value).criadoEm),\"yyyy-mm-dd\")&\": \"&Text(Index(Table(ir.historico),Value).descricao)&\"</i>\")\n              ),Value,\"<br>\") & \n                                            \"</td>\n                                            <td style='text-align: center; vertical-align: top;'>\" & \n                                                If(IsBlank(ir.UltimoHistorico) || IsBlank(ir.UltimoHistorico.data), \"-\", Text(ir.UltimoHistorico.data, \"dd/mm/yyyy\")) & \n                                            \"</td>\n                                            <td style='text-align: center; vertical-align: top;'>\" & \n                                                If(IsBlank(ir.UltimoHistorico), \"\", ir.UltimoHistorico.status) & \n                                            \"</td>\n                                        </tr>\",\n                                        \"<tr style='background-color: \" & bgColor & \"; font-weight: \" & fontWeight & \";'>\n                                            <td style='vertical-align: top; border-bottom: 1px solid #999;'>\" & ir.item & \"</td>\n                                            <td colspan='3' style='vertical-align: top; padding-left: \" & paddingLeft & \"; border-bottom: 1px solid #999;'>\n                                                \" & If(IsBlank(ir.UltimoHistorico), \"\", ir.UltimoHistorico.descricao) & \"\n                                            </td>\n                                        </tr>\"\n                                    )\n                                    )\n                                ) & \n                            \"</table>\n                            </body></html>\"\n                        },\n                        Office365Outlook.SendEmailV2(\n                            CRP.email, \n                            \"Ações Pendentes - Ata \" & IfError(Text(ParseJSON(varJSONImportado).cabecalho.numero), \"\"), \n                            HTMLGerado, \n                            {\n                                Importance: \"Normal\",\n                                IsHtml: true\n                            }\n                        )\n                    )\n                )\n            )\n        )\n    )\n);\nNotify(\"E-mails enviados com sucesso!\", NotificationType.Success);\nSet(showModalEmailAta, false)"
                                    Text: ="Enviar E-mails"
                                    Width: =200
