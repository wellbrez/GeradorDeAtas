                        - ContainerEmailPendentes:
                            Control: GroupContainer@1.4.0
                            Variant: AutoLayout
                            Properties:
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =10
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
