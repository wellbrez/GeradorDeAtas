                                            Text(varCabecalhoEmail.data, "dd/mm/yyyy") &
                                            "</td><td style=''" & estiloCabecalhoTexto & "width:20%;'>Responsável</td><td style=''" & estiloResposta & "width:30%;;'>" &
                                            Coalesce(varCabecalhoEmail.responsavel, "") &
