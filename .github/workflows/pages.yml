# Publica o site em GitHub Pages a partir do build (pasta dist).
# Não cria branch gh-pages: a origem em Settings → Pages deve ser "GitHub Actions".
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# actions: read — necessário para o job deploy baixar o artifact do build
permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
